<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitié Transport V2</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f3f4f6;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:5px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button.secondary{
background:#e2e8f0;
color:#111;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
text-align:center;
}

.stat{
background:white;
padding:10px;
border-radius:10px;
}

.patient{
border-bottom:1px solid #eee;
padding:10px 0;
}

.badge{
padding:3px 8px;
border-radius:6px;
font-size:12px;
}

.todo{background:#fde68a}
done{background:#bbf7d0}
drop{background:#bfdbfe}

</style>
</head>

<body>

<div class="container">

<h1>Pitié Transport</h1>
<p>Gestion rapide des courses patients</p>

<div class="card">

<input id="search" placeholder="Rechercher patient ou chambre">

</div>

<div class="stats">

<div class="stat">
<h2 id="total">0</h2>
<p>Total</p>
</div>

<div class="stat">
<h2 id="todo">0</h2>
<p>À faire</p>
</div>

<div class="stat">
<h2 id="picked">0</h2>
<p>Récupérés</p>
</div>

<div class="stat">
<h2 id="done">0</h2>
<p>Déposés</p>
</div>

</div>

<div class="card">

<h3>Ajouter patient</h3>

<input id="nom" placeholder="Nom patient">
<input id="chambre" placeholder="Chambre">
<input id="destination" placeholder="Destination">

<select id="urgence">
<option value="Normal">Normal</option>
<option value="Urgent">Urgent</option>
</select>

<button onclick="addPatient()">Ajouter</button>

</div>

<div class="card">

<h3>Liste des courses</h3>

<div id="patients"></div>

</div>

<div class="card">

<button class="secondary" onclick="clearAll()">Tout effacer</button>
<button onclick="exportData()">Exporter</button>

</div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")||"[]")

function save(){
localStorage.setItem("patients",JSON.stringify(patients))
render()
}

function addPatient(){

let nom=document.getElementById("nom").value
let chambre=document.getElementById("chambre").value
let destination=document.getElementById("destination").value
let urgence=document.getElementById("urgence").value

if(!nom)return

patients.push({
nom,
chambre,
destination,
urgence,
status:"todo",
time:new Date().toLocaleTimeString()
})

save()

document.getElementById("nom").value=""
document.getElementById("chambre").value=""
document.getElementById("destination").value=""

}

function setStatus(i,status){
patients[i].status=status
save()
}

function clearAll(){
patients=[]
save()
}

function exportData(){

let data="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(patients))

let link=document.createElement("a")
link.setAttribute("href",data)
link.setAttribute("download","courses.json")
link.click()

}

function render(){

let list=document.getElementById("patients")
list.innerHTML=""

let total=patients.length
let todo=0
let picked=0
let done=0

patients.forEach((p,i)=>{

if(p.status=="todo")todo++
if(p.status=="picked")picked++
if(p.status=="done")done++

let div=document.createElement("div")
div.className="patient"

div.innerHTML=`

<b>${p.nom}</b> — ${p.chambre} → ${p.destination}<br>
<small>${p.time} | ${p.urgence}</small><br>

<button onclick="setStatus(${i},'picked')">Récupéré</button>
<button onclick="setStatus(${i},'done')">Déposé</button>

`

list.appendChild(div)

})

document.getElementById("total").innerText=total
document.getElementById("todo").innerText=todo
document.getElementById("picked").innerText=picked
document.getElementById("done").innerText=done

}

render()

</script>

</body>
</html>
